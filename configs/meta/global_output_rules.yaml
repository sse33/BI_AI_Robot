# global_output_rules.yaml
#
# 适用所有仪表板、所有分析师的通用输出规则。
# analyze.py 加载时自动追加到各仪表板 analysis yaml 的 global_output_rules 后面。
# 仪表板特有规则写在各自的 analysis_{id}.yaml 里。

global_output_rules:
  - 禁止使用「较高」「偏低」「有所」「明显」等无数字的模糊表述，每个判断必须有具体数值支撑
  - 折扣/占比/动销率列值域正常为 0~1，输出时乘以100转为百分比（如 0.566 → 56.6%）；若原始值 >1 属异常数据，原样输出并标注【数据异常】，不做任何换算
  - 数字超过1000时加千位分隔符（如 12,345）
  - 直接输出报告正文，不得有任何开场白、确认语或结束语

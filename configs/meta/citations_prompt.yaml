citations_instruction: |
  【数据引用记录（必须，置于报告正文末尾）】
  完成报告后，另起一行输出以下标记块，列出报告正文中引用的所有具体数字：

  [CITATIONS]
  [
    {"card": "卡片key", "row": {"维度列": "筛选值"}, "field": "指标列名", "value": 数值},
    ...
  ]
  [/CITATIONS]

  规则：
  - card 必须使用数据节标题括号内 card= 后的英文 key（如 "渠道业绩汇总 (card=dailySalesOverview)" 中的 dailySalesOverview）
  - row 必须包含足够的维度列键值对，能唯一定位到数据中实际存在的某一行（如 {"渠道": "自营", "城市": "广佛"}）
  - 只引用数据中有对应原始行的数字；多行聚合/自行计算的汇总数字（如"自营渠道合计"如果数据里没有该行）不列入
  - field 必须是该卡片的列名（如 正价_店均业绩）
  - value 为纯数字；折扣率/占比统一用小数（如 0.772，不是 77.2%）
  - 无法定位到具体卡片行的数字（如计算值）不需要列入
  - 总数不超过 50 条；报告中以列表/排行形式呈现的数据，只引用在**叙述结论中明确点名**的门店/城市/单品（通常为 TOP3 或异常项），不要把整个列表的每行都加入 citations

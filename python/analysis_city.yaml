# 城市粒度分析框架元数据
# 关联仪表板：reports_meta.yaml → alias: daily_sales
# 分析粒度：城市级（渠道×城市）
# 输出：daily_sales_city_YYYYMMDD.md，每日推送飞书
#
# 字段说明：
#   sections[].questions      分析问题，逐条传给 LLM 作为分析指令
#   sections[].alerts         预警规则，满足条件的行在报告中点名
#   sections[].derived        预先计算的衍生指标（避免 LLM 自行计算出错）
#   sections[].output_hints   对 LLM 输出格式的具体要求
#   sections[].data_prep      压缩策略：每个卡片如何变换为 LLM 可读文本
#
# data_prep[].mode 取值：
#   full_rows   全量行，可配合 include_cols/exclude_cols/col_pattern_include/
#               col_pattern_exclude/row_filter/sort_by 使用
#   aggregate   按 group_by 维度聚合，在 agg 中声明每列的聚合函数
#   alert_only  只传满足 alerts 条件的行（用于在摘要中单独汇报预警内容）
#
# data_prep[].agg[].func 取值：
#   sum          求和
#   weighted_avg 加权平均，需配合 weight_col 使用
#   count        计数

dashboard_id: daily_sales
report_level: city
output_file_pattern: "daily_sales_city_{date}.md"
feishu_push: true
generated_at: "2026-03-26"
version: 1

# ── 阶段一：分析框架 ──────────────────────────────────────────────────────────
# 由 generate_analysis.py 根据 cards.yaml 自动生成，人工可审核修改
# 描述"要分析什么、从什么视角看"，与提示词语言无关

analysis_context:
  domain: 零售日报
  subject: OCH线下每日销售
  granularity: 城市级（渠道×城市）
  audience: 零售管理团队
  key_dimensions: [渠道, 城市, 新/旧货, 运营中类, 波段, skc编码]
  key_metrics: [业绩, 店均业绩, UPT, 客单价, 实销折扣, 销售吊牌%, 总进吊牌%, 动销率]

sections:

  - id: channel_city_performance
    title: "一、渠道&城市业绩总览"
    intent: "评估各渠道（自营/托管/联营）和城市的销售规模、效率与折扣健康度，识别高效/低效城市和折扣异常点"
    cards:
      - dailySalesOverview
    questions:
      - "分渠道（自营/托管/联营）对比正价和奥莱的业绩总量、店均、UPT、客单价、实销折扣"
      - "列出全部城市业绩明细，按正价店均降序排列，标注渠道归属"
      - "城市效率分级：正价店均 >6000 为高效（🟢），3000~6000 为中效（🟡），<3000 为低效（🔴）"
    alerts:
      - id: discount_warning
        label: "折扣预警"
        card: dailySalesOverview
        metric: 正价_实销折扣
        op: lte
        value: 0.70
        dim_cols: [渠道, 城市]
        message: "正价实销折扣≤70%，逐城市点名，给出折扣值+店均"
    output_hints:
      - "渠道汇总用一行紧凑格式：渠道名 正价X元（N店，店均X，折X折）奥莱X元（N店，店均X）"
      - "城市明细格式：渠道_城市（N店，店均X，UPT X.XX，客单X，折X折）"
    data_prep:
      # 视角1：渠道汇总（回答"渠道对比"的分析问题）
      - card: dailySalesOverview
        label: "渠道汇总"
        mode: aggregate
        group_by: [渠道]
        agg:
          - col: 正价_业绩
            func: sum
          - col: 正价_店数
            func: sum
          - col: 正价_店均业绩
            func: weighted_avg
            weight_col: 正价_店数
          - col: 正价_UPT
            func: weighted_avg
            weight_col: 正价_店数
          - col: 正价_客单价
            func: weighted_avg
            weight_col: 正价_店数
          - col: 正价_实销折扣
            func: weighted_avg
            weight_col: 正价_业绩
          - col: 奥莱_业绩
            func: sum
          - col: 奥莱_店数
            func: sum
          - col: 奥莱_店均业绩
            func: weighted_avg
            weight_col: 奥莱_店数
          - col: 奥莱_实销折扣
            func: weighted_avg
            weight_col: 奥莱_业绩
      # 视角2：城市明细（回答"城市效率分级"的分析问题）
      - card: dailySalesOverview
        label: "城市明细"
        mode: full_rows
        include_cols:
          - 渠道
          - 城市
          - 正价_业绩
          - 正价_店数
          - 正价_店均业绩
          - 正价_UPT
          - 正价_客单价
          - 正价_实销折扣
          - 奥莱_业绩
          - 奥莱_店数
          - 奥莱_店均业绩
          - 奥莱_实销折扣
        row_filter: "正价_店数 > 0 or 奥莱_店数 > 0"
        sort_by: 正价_店均业绩
        sort_desc: true
      # 视角3：折扣预警行（回答"折扣预警城市点名"的分析问题）
      - card: dailySalesOverview
        label: "折扣预警"
        mode: alert_only
        alert_id: discount_warning

  - id: discount_product_structure
    title: "二、货品折扣结构"
    intent: "分析正价/奥莱各货品类型（正价/减价/活动/旧货）的销售占比和折损率，判断折扣结构是否健康"
    cards:
      - salesTrend
    questions:
      - "正价渠道中，当年正价/当年减价/当年活动/旧货 四类货品的扣券占比结构，识别哪类货品贡献了主要销售"
      - "各货品类型的实销折损率，判断折扣结构是否健康"
      - "渠道之间货品结构差异对比（自营 vs 联营 vs 托管）"
    output_hints:
      - "货品类型按扣券占比从高到低排列"
      - "折损率用折数表示，如：旧货实销折损 6.2 折"
    data_prep:
      # 渠道×城市的全量行，只传扣券占比和实销折损相关列
      # 过滤到总计行（城市=总计），得到各渠道汇总结构
      - card: salesTrend
        label: "渠道货品结构"
        mode: full_rows
        row_filter: "城市 == '总计'"
        col_pattern_include:
          - "扣券占比"
          - "实销折损"
        always_include_cols: [渠道, 城市]

  - id: category_diagnosis
    title: "三、品类结构诊断"
    intent: "对比各运营中类的销售吊牌%与总进吊牌%差值，识别畅销/滞销品类，发现库存积压风险"
    cards:
      - categoryStructureRegular
      - categoryStructureOutlet
    questions:
      - "正价（categoryStructureRegular）：各渠道（自营/托管/联营）新货和旧货各中类的销售吊牌%与总进吊牌%偏差，识别畅销和滞销中类"
      - "奥莱（categoryStructureOutlet）：同上，识别奥莱各渠道的品类去化压力"
      - "旧货去化：旧货销售吊牌%是否落后于旧货总进吊牌%（差值为负），各渠道对比是否一致"
      - "渠道差异：同一品类在自营/托管/联营间差值差异明显（>5%）的，单独点名说明"
    derived:
      - name: 差值
        formula: "销售吊牌% - 总进吊牌%"
        note: "正数表示畅销（销售占比>库存占比），负数表示滞销"
    alerts:
      - id: category_overstock
        label: "品类滞销预警"
        card: categoryStructureRegular
        metric: 差值
        op: lte
        value: -0.02
        dim_cols: [新/旧货, 运营中类]
        message: "差值≤-2%，销售明显落后于库存，存在积压风险"
    output_hints:
      - "正价和奥莱分开表述，标注渠道来源"
      - "格式：中类名（销售吊牌%X% / 总进吊牌%X% / 差值X%）"
      - "TOP3畅销中类和TOP3滞销中类各单独列出"
    data_prep:
      - card: categoryStructureRegular
        label: "正价品类结构"
        mode: full_rows
        include_cols: [渠道, 新/旧货, 运营中类, 销售吊牌%, 总进吊牌%]
        derived:
          - name: 差值
            formula: "销售吊牌% - 总进吊牌%"
        sort_by: 差值
        sort_desc: false    # 差值从小到大，滞销在前更醒目
      - card: categoryStructureOutlet
        label: "奥莱品类结构"
        mode: full_rows
        include_cols: [渠道, 新/旧货, 运营中类, 销售吊牌%, 总进吊牌%]
        derived:
          - name: 差值
            formula: "销售吊牌% - 总进吊牌%"
        sort_by: 差值
        sort_desc: false

  - id: skc_efficiency
    title: "四、SKC效率与断码预警"
    intent: "评估TOP10 SKC的销售效率和断码风险，识别T+1销售为零且消化率高的款，给出48h处置指令"
    cards:
      - skcTop10
      - drillSkcRankingStore
    questions:
      - "TOP10 SKC 的当日销售、累计消化率、周转效率（店存周转周）"
      - "识别 T+1销售=0 且店存消化率>40% 的款，判定为断码或曝光不足，给出48h处置指令"
      - "TOP10 SKC 在各门店的存货分布是否均衡"
    alerts:
      - id: stockout_warning
        label: "断码预警"
        card: skcTop10
        conditions:
          - metric: T+1销售_金额
            op: eq
            value: 0
          - metric: 周转率_店存消化率
            op: gte
            value: 0.40
        logic: AND
        dim_cols: [skc编码, 波段]
        message: "T+1销售为0且消化率≥40%，疑似断码或陈列缺失，需48h内核查"
    output_hints:
      - "每款 SKC 一行：编码（波段 消化率X% 周转X周 T+1销售X件）"
      - "断码款需给出具体处置动作：[补货/调货/陈列整改]→时限→目标"
    data_prep:
      - card: skcTop10
        label: "TOP10 SKC"
        mode: full_rows
        exclude_cols: [照片]
      - card: drillSkcRankingStore
        label: "SKC店铺存货"
        mode: full_rows      # 共94行，直接全量传入

  - id: sellthrough_city
    title: "五、波段动销与新货铺货结构"
    intent: "分析近六波段各城市店铺动销率分布，识别动销红线城市，同时评估新波段铺货结构风险"
    cards:
      - skcSellThroughCity
      - drillCategoryBandSellThroughCity
    questions:
      # --- 动销率分析（基于 skcSellThroughCity）---
      - "近六个波段各城市的店铺动销率分布，按波段逐一列出所有城市的动销率"
      - "识别动销率<5%的城市×波段组合，标注为动销红线"
      - "给出调拨建议：动销率高的城市（调出货源）→动销率低的城市（接收货品）"
      # --- 新波段铺货结构分析（基于 drillCategoryBandSellThroughCity）---
      # 当前新波段（26A/26B）尚无销售，动销率全部为0，以下分析铺货风险敞口
      - "新波段铺货结构：各渠道×品类 在各波段的铺货SKC数（skc数_投放），哪个品类铺货最重？"
      - "铺货最重的品类当前动销率均为0%（新货尚未产生销售），标注为「待观察」并按铺货量排序列出TOP5风险品类"
      - "各渠道铺货集中度对比：自营/托管/联营 在各品类的铺货量是否均衡？识别铺货明显偏多的渠道×品类"
      # 注：当新波段有实际销售数据后，以下分析模板可直接启用：
      # - "品类×波段×城市动销率，识别结构性滞销品类"
      # - "给出基于动销率的跨城市调拨建议"
    alerts:
      - id: sellthrough_red_line
        label: "动销红线"
        card: skcSellThroughCity
        metric: "_动销率_店铺"
        op: lt
        value: 0.05
        dim_cols: [城市]
        message: "店铺动销率<5%，逐波段×城市点名，注明当前动销率和建议调拨方向"
    output_hints:
      - "动销率格式：波段名：城市A(X%) 城市B(X%) ... 全部城市列出，不遗漏"
      - "预警城市用 ⚠️ 标注"
      - "调拨建议格式：[调拨] 高动销城市→低动销城市，目标动销率X%，时限X天"
      - "新波段铺货分析：若动销率全部为0，不做动销比较，改为报告铺货风险敞口"
      - "铺货风险格式：⚠️ 零动销待观察 品类（正价总铺X skc / 奥莱总铺X skc），渠道分布：自营N 托管N 联营N"
      - "按正价+奥莱合计铺货量从高到低排列TOP5品类"
    data_prep:
      # 视角1：城市×波段动销率（来自 skcSellThroughCity）
      - card: skcSellThroughCity
        label: "城市波段动销率"
        mode: full_rows
        always_include_cols: [渠道, 城市]
        col_pattern_include:
          - "_动销率_店铺"    # 只传店铺维度动销率，不传城市维度（避免 LLM 混用）
        # 不传 _动销率_城市 和 _skc数_ 列，减少 token 并防止混淆

      # 视角2：新波段铺货结构（来自 drillCategoryBandSellThroughCity）
      # 按渠道×品类聚合，传各波段 skc数_投放，揭示库存风险敞口
      # 注：当新波段有销售后，可在此并列增加 _动销率_店铺 的 agg（weighted_avg）
      - card: drillCategoryBandSellThroughCity
        label: "新波段铺货结构（渠道×品类）"
        mode: aggregate
        group_by: [渠道, 运营中类]
        agg:
          # 正价各波段铺货SKC数
          - col: 正价_26A_4A_skc数_投放
            func: sum
          - col: 正价_26A_3B_skc数_投放
            func: sum
          - col: 正价_26A_3A_skc数_投放
            func: sum
          - col: 正价_26B_3X_skc数_投放
            func: sum
          - col: 正价_26A_2Y_skc数_投放
            func: sum
          - col: 正价_26B_3Y_skc数_投放
            func: sum
          # 奥莱各波段铺货SKC数
          - col: 奥莱_26A_4A_skc数_投放
            func: sum
          - col: 奥莱_26B_3Y_skc数_投放
            func: sum
          - col: 奥莱_26B_3X_skc数_投放
            func: sum
          - col: 奥莱_26A_3B_skc数_投放
            func: sum
          - col: 奥莱_26A_3A_skc数_投放
            func: sum
          - col: 奥莱_26A_2Y_skc数_投放
            func: sum

# ── 阶段二：提示词配置 ────────────────────────────────────────────────────────
# 由 generate_prompt.py 根据 analysis_context + sections 渲染生成
# analyze.py 直接读取此块，不再有任何硬编码提示词

prompts:
  system: |
    你是赫基集团零售业务高级数据分析师。
    输出风格：数字密集、结论前置、每句话都有具体数值支撑，禁止泛泛而谈。
    引用数据时采用紧凑内嵌格式，如：自营广佛正价54,916（5店，店均10,983，UPT 3.04，客单1,961，折扣82.8%）。
    直接输出报告正文，不得有任何开场白、确认语或结束语。

  output_format: |
    请按以下八节输出日报：

    一、核心结论（≤3条，每条一句话含关键数字，覆盖：整体量级、最大结构问题、最紧迫风险）

    二、关键指标证据（8个，格式：【指标名】具体值→一句话含义）
    必须含：正价/奥莱整体规模（业绩+店数+店均+UPT+客单+折扣）、最强/最弱城市对比、折扣异常城市、新旧货吊牌vs销售占比差、TOP3滞销中类（含吊牌%vs销售%差值）、TOP10断码状态、压力最大波段+最低城市动销率

    三、结构诊断
    1. 渠道：自营/托管/联营各自 业绩/店均/折扣，哪个渠道是正价主引擎/奥莱主引擎
    2. 城市：最强2城（内嵌数据+原因）、最弱2城（内嵌数据+原因）、调拨承接候选
    3. 品类：新旧货吊牌vs销售占比差值、TOP3畅销/滞销中类（含占比）、最危险波段

    四、TOP10 SKC结论（波段/品类/价格带分布；断码款逐一给出48h补货或陈列核查指令）

    五、近六波动销（每波段列出所有城市具体动销率；按南区/北区/中西部分区汇总；点名调拨出去的城市×波段→调拨目的地）

    六、城市优先级
    🔴红区（2-3城）：问题类型（动销/价盘/客单）+ 具体指标值
    🟡黄区（2-3城）：观察重点 + 升红触发条件（含阈值）
    🟢绿区（2-3城）：核心优势 + 是否可作调拨承接或打法模板

    七、执行动作（4条，格式：[方向] 动作→时限→量化目标，覆盖：调拨补货/陈列连带/折扣管控/品类结构）

    八、复盘指标（3个，Markdown表格：指标名|当前值|下次目标值|监控原因）

  global_output_rules:
    - "每节数字必须内嵌在叙述句中，格式如：城市名（N店，店均X，UPT X.XX，客单X，折X折）"
    - "执行动作必须含：[方向] 具体动作→时限→量化目标（含数字）"
    - "禁止使用「较高」「偏低」「有所」等无数字的模糊表述"
